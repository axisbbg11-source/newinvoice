name: bizdesk
description: BizDesk — Run your business from your pocket.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3
  http: ^1.2.0

  # Local storage
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # PDF
  pdf: ^3.10.8
  printing: ^5.13.1

  # Image picker (expense receipts)
  image_picker: ^1.1.2

  # File handling
  path_provider: ^2.1.3
  open_filex: ^4.5.0

  # Date formatting
  intl: ^0.19.0

  # URL launcher (WhatsApp share)
  url_launcher: ^6.3.0

  # Share
  share_plus: ^9.0.0

  # Charts
  fl_chart: ^0.68.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
